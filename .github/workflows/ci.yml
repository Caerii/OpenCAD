name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**

jobs:
  python:
    name: Python
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Install Python dependencies
        run: uv sync --extra test --extra server
      - name: Run Python tests
        run: uv run --no-sync python -m pytest

  viewport:
    name: Viewport
    runs-on: windows-latest
    defaults:
      run:
        working-directory: opencad_viewport
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.25.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: opencad_viewport/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: pnpm test
      - name: Build frontend
        run: pnpm build
